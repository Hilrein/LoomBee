# =============================================================================
# SwiftLint Configuration — LoomBee
# Strict but pragmatic. Compatible with .swiftformat.
# =============================================================================

# -- Disabled Rules --------------------------------------------------------
# These are handled by SwiftFormat to avoid conflicts.
disabled_rules:
  - trailing_whitespace        # SwiftFormat: trimwhitespace
  - colon                      # SwiftFormat: spaceAroundOperators
  - vertical_whitespace        # SwiftFormat: consecutiveBlankLines
  - opening_brace              # SwiftFormat: braces
  - statement_position          # SwiftFormat: elseOnSameLine
  - comma                      # SwiftFormat: spaceAroundCommas
  - line_length                # Use SwiftFormat --maxwidth instead
  - todo                       # TODOs are fine during development
  - nesting                    # Too strict for SwiftUI view builders

# -- Opt-in Rules ----------------------------------------------------------
opt_in_rules:
  # Safety
  - force_unwrapping
  - implicitly_unwrapped_optional
  - fatal_error_message
  - discouraged_optional_boolean
  - discouraged_optional_collection

  # Code quality
  - empty_count
  - empty_string
  - first_where
  - last_where
  - contains_over_filter_count
  - contains_over_first_not_nil
  - flatmap_over_map_reduce
  - reduce_boolean
  - reduce_into
  - sorted_first_last

  # Access control
  - explicit_top_level_acl
  - redundant_type_annotation

  # Formatting helpers (non-conflicting with SwiftFormat)
  - multiline_arguments
  - multiline_parameters
  - multiline_function_chains
  - vertical_whitespace_opening_braces
  - vertical_whitespace_closing_braces
  - closure_spacing
  - unneeded_parentheses_in_closure_argument

  # Misc
  - overridden_super_call
  - yoda_condition
  - toggle_bool
  - unavailable_function
  - unowned_variable_capture
  - file_name_no_space

# -- Included / Excluded Paths ---------------------------------------------
included:
  - Sources
  - Tests

excluded:
  - .build
  - DerivedData
  - Package.swift

# -- Rule Configuration -----------------------------------------------------

force_unwrapping:
  severity: warning

force_cast:
  severity: error

force_try:
  severity: warning

trailing_comma:
  mandatory_comma: true

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - ok
    - to
    - x
    - y
    - i
    - j
    - vm

type_name:
  min_length:
    warning: 3
    error: 1
  max_length:
    warning: 50
    error: 60

function_body_length:
  warning: 60
  error: 120

file_length:
  warning: 500
  error: 1000
  ignore_comment_only_lines: true

type_body_length:
  warning: 300
  error: 500

cyclomatic_complexity:
  warning: 12
  error: 20

large_tuple:
  warning: 3
  error: 4

function_parameter_count:
  warning: 6
  error: 8

implicitly_unwrapped_optional:
  severity: warning
  mode: all_except_iboutlets

reporter: xcode
