# =============================================================================
# LoomBee — XcodeGen Project Configuration
#
# This file is the source of truth for the Xcode project structure.
# The .xcodeproj is generated and NOT committed to git.
#
# Regenerate with: xcodegen generate
# =============================================================================

name: LoomBee

options:
  bundleIdPrefix: com.loombee
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: complete

packages:
  LoomBee:
    path: .

targets:
  LoomBee:
    type: application
    platform: macOS
    sources:
      - path: Sources/LoomBee
    dependencies:
      - package: LoomBee
        product: LoomBeeCore
      - package: LoomBee
        product: LoomBeeDesignSystem
      - package: LoomBee
        product: FeatureMediaControl
      - package: LoomBee
        product: FeatureHUD
      - package: LoomBee
        product: FeatureFileShelf
      - package: LoomBee
        product: FeatureCalendar
      - package: LoomBee
        product: FeatureSettings
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.loombee.app
        PRODUCT_NAME: LoomBee
        INFOPLIST_VALUES: >-
          CFBundleName=LoomBee
          CFBundleDisplayName=LoomBee
          CFBundleShortVersionString=0.1.0
          CFBundleVersion=1
          LSUIElement=true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
    info:
      path: Sources/LoomBee/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: LoomBee
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 LoomBee Contributors"

schemes:
  LoomBee:
    build:
      targets:
        LoomBee: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LoomBeeCoreTests
        - LoomBeeDesignSystemTests
